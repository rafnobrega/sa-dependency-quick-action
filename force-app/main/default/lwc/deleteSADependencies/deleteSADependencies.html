<template>
    <div class="card-container">
        <div class="card-header">
            <lightning-icon icon-name="standard:service_appointment" size="small"></lightning-icon>
            <span class="header-title">Delete SA Dependencies</span>
        </div>
        <div class="card-body">
            <template lwc:if={showConfirmation}>
                <p class="description">
                    Delete all <strong>Time Dependencies</strong> for Service Appointments on this Work Order.
                </p>
                <label class="checkbox-row">
                    <input type="checkbox" checked={includeWoliSAs} onchange={handleToggleWoli} />
                    <span class="checkbox-label">Include Service Appointments from Work Order Line Items</span>
                </label>
                <p class="description sub-text">
                    This action cannot be undone.
                </p>
                <div class="button-row">
                    <lightning-button
                        label="Delete Dependencies"
                        variant="destructive"
                        onclick={handleDelete}>
                    </lightning-button>
                    <lightning-button
                        label="Cancel"
                        onclick={handleClose}>
                    </lightning-button>
                </div>
            </template>

            <template lwc:if={isProcessing}>
                <div class="spinner-container">
                    <lightning-spinner alternative-text="Deleting dependencies..." size="medium"></lightning-spinner>
                    <p class="spinner-text">Deleting dependencies...</p>
                </div>
            </template>

            <template lwc:if={isComplete}>
                <div class={resultClass}>
                    <lightning-icon icon-name={resultIcon} variant={resultVariant} size="small"></lightning-icon>
                    <span class="result-text">{resultMessage}</span>
                </div>
                <div class="button-row">
                    <lightning-button
                        label="Close"
                        variant="brand"
                        onclick={handleClose}>
                    </lightning-button>
                </div>
            </template>
        </div>
    </div>
</template>
