<template>
    <div class="card-container">
        <div class="card-header">
            <lightning-icon icon-name="standard:service_appointment" size="small"></lightning-icon>
            <span class="header-title">Create SA Dependencies</span>
        </div>
        <div class="card-body">
            <template lwc:if={showConfirmation}>
                <p class="description">
                    Create sequential <strong>Finish-to-Start</strong> dependencies for all Service Appointments under this Work Order, ordered by Earliest Start Permitted.
                </p>
                <p class="description sub-text">
                    Existing dependencies will be removed and recreated.
                </p>
                <div class="button-row">
                    <lightning-button
                        label="Create Dependencies"
                        variant="brand"
                        onclick={handleCreate}>
                    </lightning-button>
                    <lightning-button
                        label="Cancel"
                        onclick={handleClose}>
                    </lightning-button>
                </div>
            </template>

            <template lwc:if={isProcessing}>
                <div class="spinner-container">
                    <lightning-spinner alternative-text="Creating dependencies..." size="medium"></lightning-spinner>
                    <p class="spinner-text">Creating dependencies...</p>
                </div>
            </template>

            <template lwc:if={isComplete}>
                <div class={resultClass}>
                    <lightning-icon icon-name={resultIcon} variant={resultVariant} size="small"></lightning-icon>
                    <span class="result-text">{resultMessage}</span>
                </div>
                <div class="button-row">
                    <lightning-button
                        label="Close"
                        variant="brand"
                        onclick={handleClose}>
                    </lightning-button>
                </div>
            </template>
        </div>
    </div>
</template>
